services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"  # FastAPI exposed on 8000
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    restart: unless-stopped
    networks:
      - rag_network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    ports:
      - "8501:8501"  # Streamlit exposed on 8501
    environment:
      # Connects to the backend using the Docker container name and internal port
      - BACKEND_URL=http://rag_backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rag_network
  chromadb:
    image: chromadb/chroma
    container_name: rag_vector_db
    ports:
      - "8001:8000"  # Chroma DB exposed on 8001
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=True
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped
    networks:
      - rag_network
  
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - rag_network

  ollama-init:
    image: curlimages/curl:latest
    container_name: ollama_init
    depends_on:
      - ollama
    command: >
      sh -c "sleep 5 && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.1\"}'"
    restart: "no"
    networks:
      - rag_network
volumes:
  chroma_data:
  hf_cache:
  ollama_data:

networks:
  rag_network:
    driver: bridge